        /* ===================== BLOG ===================== */ 
 
.blog-toolbar { 
    position: sticky; 
    top: 20px; 
    right: 20px; 
    z-index: 1000000; 
} 
 
.sort-btn { 
    font-size: 11px; 
    color: black; 
    cursor: pointer; 
    padding: 2px 8px; 
} 
 
 
.sort-btn.active-sort { 
    color: #0000cc; 
} 
 
.no-posts { 
    text-align: center; 
 
    background: white; 
 
 
    padding: 30px; 
 
    font-size: 12px; 
} 
 
/* ===================== POST ===================== */ 
 
.post { 
    position: relative; 
    overflow: visible; 
    margin-bottom: 24px; 
} 
 
/* dot maior — mais próximo do balão */ 
.post::before { 
    content: ""; 
    position: absolute; 
    right: -10px; 
    bottom: -10px; 
    width: 14px; 
    height: 14px; 
    background: white; 
    border: 1px solid black; 
    border-radius: 50%; 
    transform: none; /* remove o translateY antigo */ 
} 
 
/* dot médio */ 
.post::after { 
    content: ""; 
    position: absolute; 
    right: -22px; 
    bottom: -20px; 
    width: 9px; 
    height: 9px; 
    background: white; 
    border: 1px solid black; 
    border-radius: 50%; 
    display: block; /* sobrescreve o border-top que estava aqui */ 
    border-top: none; 
} 
 
/* dot pequeno — mais longe */ 
.thought-dot { 
    position: absolute; 
    right: -31px; 
    bottom: -28px; 
    left: auto; /* remove o `left: -8px` antigo */ 
    top: auto;  /* remove o `top: calc(50% + 35px)` antigo */ 
    width: 5px; 
    height: 5px; 
    background: white; 
    border: 1px solid black; 
    border-radius: 50%; 
} 
 
.thought-dot { 
    position: absolute; 
 
    left: -8px; 
    top: calc(50% + 35px); 
 
    width: 5px; 
    height: 5px; 
 
    background: white; 
    border: 1px solid black; 
 
    border-radius: 50%; 
} 
 
 
.post-head { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    color: rgb(0, 0, 0); 
    font-size: 11px; 
} 
 
.post-head-left { 
    display: flex; 
    gap: 10px; 
    align-items: center; 
} 
 
.post-author { 
    color: #000000; 
    font-weight: bold; 
    font-size: 15px; 
     
} 
 
.post-mood {

} 
 
.post-date {

} 
 
.post-no {

} 
 
.post-del-btn { 
    background: #c0c0c0; 
 
    color: #990000; 
 
    font-size: 10px;

    border-left: 2px solid #ffffff;

    border-bottom: 2px solid #555555;

} 
 
.post-del-btn:hover {

} 
 
.post-body-inner { 
    border: #000000 1px solid; 
    background-color: white; 
    padding: 4px; 
    color: black; 
    font-size: 18px; 
    text-align: left; 
    border-radius: 2%; 
} 
 
.post-content { 
    white-space: normal; 
} 
 
/* links inside posts */ 
 
.post-content a { 
    color: #0000ff; 
    text-decoration: underline; 
} 
 
.post-content a:hover { 
    color: #ff0000; 
} 
 
/* image posts */ 
 
.post-img-wrap { 
    margin-top: 10px; 
    margin-bottom: 10px; 
 
    display: inline-block; 
} 
 
.post-img-wrap img { 
   
    width: 100%; 
        height: 100%; 

} 
 
.post-img-info {
    display: inline-flex;
    color: #000066;
    font-size: 12px;
    /* text-align: center; */
    margin: auto 2%;
    text-decoration: underline;
}
 
/* spoiler */ 
 
.spoiler { 
    background: black; 
    color: black; 
 
    cursor: pointer; 
 
    padding: 2px; 
} 
 
.spoiler.revealed { 
    background: transparent; 
    color: inherit; 
} 
 
.spoiler-cover {
    display: inline-block;
    background: repeating-linear-gradient(45deg, #000000, #000000 8px, #222222 8px, #222222 16px);
    color: #ffffff;
    font-size: 100%;
    padding:  20;
    /* border: 3px ridge #999999; */
    cursor: pointer;
    text-align: center;
}

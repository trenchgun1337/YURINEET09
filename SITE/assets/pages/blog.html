<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>blog</title>

    <!-- XP.css — 98 theme (mais compatível com o aesthetic gótico retro) -->
<link
  rel="stylesheet"
  href="https://unpkg.com/xp.css"
> 
    <style> 

        /* ===================== BASE ===================== */ 
        body { 
            background: url(https://i.pinimg.com/736x/9c/6f/bb/9c6fbb96c9bf74609d2dc1e5aa5d09e3.jpg); 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            margin: 0; 
            min-height: 100vh; 
        } 
        
        text {
            font-size: 12px;
        }

        body::before { 
            content: ""; 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            pointer-events: none; 
            z-index: 999999; 
            border: 32px solid transparent; 
            border-image: 
                url("https://i.pinimg.com/originals/21/ea/03/21ea03d955f26389cbed8efcbf82d01b.gif") 
                32 
                round; 
        } 
         
        .title { 
            color: #000000; 
            font-size: 90px; 
            margin-bottom: 10px; 
            text-align: center; 
        } 
 
        .title2 { 
            color: #000066; 
            font-size: 170px; 
            text-align: center; 
            height: 200px; 
            display: inline-block; 
            width: 100%; 
            transform: scaleY(2.3); 
            transform-origin: top; 
            margin-bottom: 400px; 
        } 
 
        .normaltext { 
            font-size: 16px; 
            line-height: 1.5; 
        } 
 
        a { 
            font-size: 16px; 
            color: #0000CC; 
            text-decoration: none; 
        } 
 
        a:hover { 
            font-size: 16px; 
            color: #CC0000; 
            text-decoration: underline; 
        } 
 
        p { 
            font-size: 20px; 
            color: #000000; 
            text-align: center; 
        } 
 
        /* ===== .blackcontainer → win98 window raised panel ===== */
        .blackcontainer { 
            color: #000000; 
            font-size: 20px; 
            width: 35%; 
            height: 90%; 
            margin: -35px 48px 30px auto; 
            padding: 0;
            box-sizing: border-box; 

            background: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #555555;
            border-bottom: 2px solid #555555;
            box-shadow: 1px 1px 0 0 #000000;
        }

        /* padding interno para filhos diretos (exceto toolbar) */
        .blackcontainer > *:not(.blog-toolbar) {
            padding: 8px 10px;
        }
        .blackcontainer > .blog-toolbar {
            padding: 2px 4px;
        }
 
        .post-title { 
            color: rgb(0, 0, 102); 
            font-size: 24px; 
            font-weight: bold; 
            margin-bottom: 5px; 
            text-align: left; 
        } 
 
        .slash-item:hover { 
            background: #000066; 
            color: white; 
            cursor: pointer; 
        } 
 
        /* ===== .blog-toolbar → win98 menu bar ===== */
        .blog-toolbar { 
            position: sticky; 
            top: 20px; 
            right: 20px; 
            z-index: 1000000;

            background: #c0c0c0;
            border-bottom: 1px solid #808080;
        } 
 
        .sort-btn { 
            font-size: 11px; 
            color: black; 
            cursor: pointer; 
            padding: 2px 8px; 
            /* bordas e bg herdados do 98.css button */
        } 
 
        .sort-btn.active-sort { 
            color: #000080;
            font-weight: bold;
        } 
 
        /* ===== .no-posts → sunken panel win98 ===== */
        .no-posts { 
            text-align: center; 
            background: white; 
            padding: 30px; 
            font-size: 12px;

            border-top: 1px solid #808080;
            border-left: 1px solid #808080;
            border-right: 1px solid #dfdfdf;
            border-bottom: 1px solid #dfdfdf;
        } 
 
        /* ===================== POST ===================== */ 
 
        .post { 
            position: relative; 
            overflow: visible; 
            margin-bottom: 24px; 
        } 
 
        .post::before { 
            content: ""; 
            position: absolute; 
            right: -10px; 
            bottom: -10px; 
            width: 14px; 
            height: 14px; 
            background: white; 
            border: 1px solid black; 
            border-radius: 50%; 
        } 
 
        .thought-dot { 
            position: absolute; 
            left: -8px; 
            top: calc(50% + 35px); 
            width: 5px; 
            height: 5px; 
            background: white; 
            border: 1px solid black; 
            border-radius: 50%; 
        } 
 
        .post-head { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            color: rgb(0, 0, 0); 
            font-size: 11px; 
        } 
 
        .post-head-left { 
            display: flex; 
            gap: 10px; 
            align-items: center; 
        } 
 
        .post-author { 
            color: #000000; 
            font-weight: bold; 
            font-size: 15px; 
        } 
 
        .post-mood { 
            color: #000066; 
            font-size: 11px; 
            font-style: italic; 
        } 
 
        .post-date { 
            color: #000000; 
        } 
 
        .post-no { 
            color: #000000; 
            text-transform: uppercase;
        } 
 
        /* ===== .post-del-btn → herda button win98 do 98.css ===== */
        .post-del-btn { 
            color: #990000; 
            font-size: 10px; 
            cursor: pointer;
        } 
 
        /* ===== .post-body-inner → sunken inset win98 ===== */
        .post-body-inner { 
            background-color: white; 
            padding: 4px; 
            color: black; 
            font-size: 18px; 
            text-align: left; 
            border-radius: 0;

            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #dfdfdf;
            border-bottom: 2px solid #dfdfdf;
        } 
 
        .post-content { 
            white-space: normal; 
        } 
 
        .post-content a { 
            color: #0000ff; 
            text-decoration: underline; 
        } 
 
        .post-content a:hover { 
            color: #ff0000; 
        } 
 
        .post-img-wrap { 
            margin-top: 10px; 
            margin-bottom: 10px; 
            display: inline-block; 
        } 
 
        .post-img-wrap img { 
            width: 100%; 
            height: 100%; 
        } 
 
        .post-img-info {
            display: inline-flex;
            color: #000066;
            font-size: 12px;
            margin: auto 2%;
            text-decoration: underline;
        }
 
        .spoiler { 
            background: black; 
            color: black; 
            cursor: pointer; 
            padding: 2px; 
        } 
 
        .spoiler.revealed { 
            background: transparent; 
            color: inherit; 
        } 
 
        .spoiler-cover {
            display: inline-block;
            background: repeating-linear-gradient(45deg, #000000, #000000 8px, #222222 8px, #222222 16px);
            color: #ffffff;
            font-size: 100%;
            padding: 20px;
            cursor: pointer;
            text-align: center;
        }

        /* geocities divider — mantido */
        .post::after { 
            content: ""; 
            display: block; 
            border-top: 2px groove #999999; 
        } 

        /* ===================== ADMIN / FORMS ===================== */

        /* ===== .content-box → win98 raised panel ===== */
        .content-box { 
            margin-bottom: 12px; 
            font-size: 12px; 
            text-align: left;
            background: #c0c0c0;

            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #555555;
            border-bottom: 2px solid #555555;
            box-shadow: 1px 1px 0 0 #000;
        } 
 
        /* ===== .content-box-head → title-bar win98 ===== */
        .content-box-head { 
            background: #000080;
            color: #ffffff; 
            padding: 3px 6px; 
            font-weight: bold;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
            letter-spacing: 0.02em;
        }

        .content-box-head::before {
            content: "🗒";
            font-size: 11px;
        }
 
        .content-box-body { 
            padding: 8px;
            background: #c0c0c0;
        } 
 
        .admin-section { 
            font-weight: bold; 
            color: #000080; 
            margin: 8px 0 4px; 
            border-bottom: 1px solid #808080; 
        } 
 
        .form-table { 
            width: 100%; 
            font-size: 11px; 
        } 
 
        .form-table td { 
            padding: 3px 4px; 
            vertical-align: top; 
        } 
 
        .form-label { 
            width: 70px; 
            color: #000000; 
        } 
 
        /* ===== .form-btn → herda button do 98.css ===== */
        .form-btn { 
            font-size: 11px; 
            color: #000000;
            padding: 2px 8px; 
            cursor: pointer;
        } 

        /* ===== inputs/textarea/select → sunken field win98 (98.css já cobre, reforço aqui) ===== */
        input[type="text"], input[type="password"], textarea, select { 
            font-family: 'Courier New', monospace; 
            font-size: 11px; 
            background: #ffffff; 
            color: #000000;
            padding: 2px 4px;
        } 
 
        /* ===================== LIGHTBOX ===================== */ 
        #lb { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.85); 
            z-index: 999; 
            align-items: center; 
            justify-content: center; 
            cursor: zoom-out; 
        } 
 
        #lb.on { 
            display: flex; 
        } 
 
        #lb-img { 
            max-width: 90%; 
            max-height: 90%; 
            border: 2px solid #ffffff; 
        } 
 
        /* ===== button global — 98.css cobre, ajuste de cor apenas ===== */
        button { 
            font-size: 12px; 
            color: #000000;
        }

        button:hover { 
            text-decoration: underline; 
        }

    </style> 
</head> 
<body> 
 
    <div class="blackcontainer"> 
        <div class="blog-toolbar">
            <text>sort:</text>
            <button id="sortBtnNewest" class="sort-btn active-sort" onclick="setSortBlog('newest')">[newest]</button> 
            <button id="sortBtnOldest" class="sort-btn" onclick="setSortBlog('oldest')">[oldest]</button>  |  
            <text>quick:</text>
            <button style="color: #222222;" onclick="gettotheend()">[charon]</button>
        </div> 
        <br><br> 
        <div id="adminContainer"></div> 
 
        <div id="postsContainer"> 
            <div class="no-posts"><img style="width: 50px;" src="https://img1.picmix.com/output/stamp/thumb/6/2/2/3/2603226_cb7c0.gif" alt=""></div> 
        </div> 
    </div> 
 
    <div id="lb" onclick="lbClose()"> 
        <img id="lb-img" alt=""> 
    </div>

    <div class="post"> 
        <span class="thought-dot"></span> 
        ... 
    </div> 

    <script src="../scripts/js/script.js"></script> 
    <script type="module" src="../scripts/js/firebase.js"></script>

        <div class="link" style="text-align: center;">
            <img style="filter:contrast(100);" src="https://img1.picmix.com/output/stamp/thumb/5/5/8/6/1726855_c666e.gif" alt="">

            <a href="../../index.html">back</a>
        </div>
    </div>

</body> 
</html>

.blog-toolbar {

.language-menu-wrap {

.language-menu {
    display: none;
    position: absolute;

.language-option {
    display: inline-flex;

.language-option img {

.sort-btn {

.sort-btn.active-sort {

.no-posts { 
    text-align: center; 
 
    background: white; 
 
 
    padding: 30px; 
 
    font-size: 12px; 
} 
 
/* ===================== POST ===================== */ 
 
.post { 
    position: relative; 
    overflow: visible; 
    margin-bottom: 24px; 
} 
 
/* dot maior — mais próximo do balão */ 
.post::before { 
    content: ""; 
    position: absolute; 
    right: -10px; 
    bottom: -10px; 
    width: 14px; 
    height: 14px; 
    background: white; 
    border: 1px solid black; 
    border-radius: 50%; 
    transform: none; /* remove o translateY antigo */ 
} 
 
/* dot médio */ 
.post::after { 
    content: ""; 
    position: absolute; 
    right: -22px; 
    bottom: -20px; 
    width: 9px; 
    height: 9px; 
    background: white; 
    border: 1px solid black; 
    border-radius: 50%; 
    display: block; /* sobrescreve o border-top que estava aqui */ 
    border-top: none; 
} 
 
/* dot pequeno — mais longe */ 
.thought-dot { 
    position: absolute; 
    right: -31px; 
    bottom: -28px; 
    left: auto; /* remove o `left: -8px` antigo */ 
    top: auto;  /* remove o `top: calc(50% + 35px)` antigo */ 
    width: 5px; 
    height: 5px; 
    background: white; 
    border: 1px solid black; 
    border-radius: 50%; 
} 
 
.thought-dot { 
    position: absolute; 
 
    left: -8px; 
    top: calc(50% + 35px); 
 
    width: 5px; 
    height: 5px; 
 
    background: white; 
    border: 1px solid black; 
 
    border-radius: 50%; 
} 
 
 
.post-head { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    color: rgb(0, 0, 0); 
    font-size: 11px; 
} 
 
.post-head-left { 
    display: flex; 
    gap: 10px;

} 
 
.post-author { 
    color: #000000; 
    font-weight: bold; 
    font-size: 15px; 
     
}

    font-size: 11px; 
    font-style: italic; 
} 
 
.post-date { 
    color: #000000; 
} 
 
.post-no { 
    color: #000000; 
    text-transform: uppercase;
} 

.post-new {

    background: transparent;
    font-size: 11px;

}

}

.post-admin-icon {
    width: 16px;
    height: 16px;
    object-fit: contain;
    vertical-align: middle;
}

.post-icon-btn {
    width: 20px;
    height: 20px;
    padding: 1px;
    cursor: pointer;
}

.post-icon-btn:hover {
    background: #e5e5ff;
}

.post-icon-btn.is-active {
    background: #fff0f0;
}
 
.post-del-btn { 
    background: #c0c0c0; 
 
    color: #990000; 
 
    font-size: 10px; 
 
    border-top: 2px solid #ffffff; 
    border-left: 2px solid #ffffff; 
    border-right: 2px solid #555555; 
    border-bottom: 2px solid #555555; 
 
    cursor: pointer; 
} 
 
.post-del-btn:hover { 
    background: #ffdddd; 
} 
 
.post-body-inner { 
    border: #000000 1px solid; 
    background-color: white; 
    padding: 4px; 
    color: black; 
    font-size: 18px; 
    text-align: left; 
    border-radius: 2%; 
} 

.post-locked {
    min-height: 70px;
    border: 1px dashed #000000;
    background: #f7f7f7;
    padding: 10px;
    text-align: center;
    font-size: 12px;
}

.post-locked img {
    width: 24px;
    height: 24px;
    object-fit: contain;
    display: block;
    margin: 0 auto 5px;
}

.post-unlock-row {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
}

.post-unlock-row input {
    width: 120px;
}
 
.post-content { 
    white-space: normal; 
} 
 
/* links inside posts */ 
 
.post-content a { 
    color: #0000ff; 
    text-decoration: underline; 
} 
 
.post-content a:hover { 
    color: #ff0000; 
} 
 
/* image posts */ 
 
.post-img-wrap { 
    margin-top: 10px; 
    margin-bottom: 10px;

} 
 
.post-img-wrap img { 
   
    width: 100%; 
        height: 100%; 

}

    display: inline-flex;
    color: #000066;
    font-size: 12px;
    /* text-align: center; */
    margin: auto 2%;
    text-decoration: underline;
}
 
/* spoiler */ 
 
.spoiler { 
    background: black; 
    color: black; 
 
    cursor: pointer; 
 
    padding: 2px; 
} 
 
.spoiler.revealed { 
    background: transparent; 
    color: inherit; 
}

    font-size: 100%;
    padding:  20;
    /* border: 3px ridge #999999; */
    cursor: pointer;
    text-align: center;
}
